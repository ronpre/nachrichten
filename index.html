<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nachrichten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0e13;
      --border: #1e2535;
      --border-bright: #2d3a52;
      --text: #d8dde8;
      --text-dim: #6b778f;
      --text-bright: #eef1f8;
      --green: #3ddc97;
      --blue: #4d8fff;
      --yellow: #f5c842;
      --red: #ff5a5a;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 15px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    header {
      padding: 1.2rem 1.6rem 0.9rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;
    }
    .logo { font-family: "IBM Plex Mono", monospace; font-size: 1rem; font-weight: 600; color: var(--text-bright); letter-spacing: 0.04em; }
    .logo span { color: var(--green); }
    .header-meta { font-family: "IBM Plex Mono", monospace; font-size: 0.72rem; color: var(--text-dim); display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    #status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); margin-right: 0.35rem; vertical-align: middle; transition: background 0.4s; }
    #status-dot.live   { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    #status-dot.paused { background: var(--yellow); }
    #status-dot.error  { background: var(--red); }

    nav { display: flex; border-bottom: 1px solid var(--border); padding: 0 1.6rem; overflow-x: auto; }
    nav button { background: none; border: none; padding: 0.65rem 1rem; font-family: "IBM Plex Mono", monospace; font-size: 0.78rem; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    nav button:hover { color: var(--text); }
    nav button[data-tab="wirtschaft"].active { color: var(--green);  border-bottom-color: var(--green); }
    nav button[data-tab="politik"].active    { color: var(--blue);   border-bottom-color: var(--blue); }
    nav button[data-tab="it"].active         { color: var(--yellow); border-bottom-color: var(--yellow); }

    main { flex: 1; max-width: 820px; width: 100%; margin: 0 auto; padding: 0.8rem 1.6rem 3rem; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .article { padding: 0.9rem 0; border-bottom: 1px solid var(--border); }
    .article:last-child { border-bottom: none; }
    .article-title { font-size: 0.93rem; font-weight: 500; color: var(--text-bright); line-height: 1.4; }
    .article-title a { color: inherit; text-decoration: none; }
    .article-title a:hover { color: var(--green); }
    .article-summary { font-size: 0.81rem; color: var(--text-dim); line-height: 1.5; margin-top: 0.2rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .article-meta { font-family: "IBM Plex Mono", monospace; font-size: 0.68rem; color: var(--text-dim); margin-top: 0.3rem; }
    .article-source { font-weight: 600; }

    .state-msg { padding: 3rem 0; text-align: center; font-family: "IBM Plex Mono", monospace; font-size: 0.78rem; color: var(--text-dim); }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border-bright); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 0.45rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { border-top: 1px solid var(--border); padding: 0.7rem 1.6rem; font-family: "IBM Plex Mono", monospace; font-size: 0.68rem; color: var(--text-dim); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.4rem; }
    @media (max-width: 560px) { header, main, footer { padding-left: 1rem; padding-right: 1rem; } nav { padding: 0 1rem; } }
  </style>
</head>
<body>
<header>
  <div class="logo">nachrichten<span>.</span></div>
  <div class="header-meta">
    <span><span id="status-dot" class="live"></span><span id="status-label">live</span></span>
    <span>aktualisiert: <strong id="last-updated">—</strong></span>
  </div>
</header>
<nav>
  <button class="active" data-tab="wirtschaft">wirtschaft</button>
  <button data-tab="politik">politik</button>
  <button data-tab="it">it</button>
</nav>
<main>
  <div class="tab-pane active" id="pane-wirtschaft"><div id="list-wirtschaft"><div class="state-msg"><span class="spinner"></span>Lade…</div></div></div>
  <div class="tab-pane" id="pane-politik"><div id="list-politik"><div class="state-msg"><span class="spinner"></span>Lade…</div></div></div>
  <div class="tab-pane" id="pane-it"><div id="list-it"><div class="state-msg"><span class="spinner"></span>Lade…</div></div></div>
</main>
<footer>
  <span>tagesschau · n-tv · heise · golem</span>
  <span>auto-refresh via GitHub Actions · stündlich 06–17 Uhr</span>
</footer>
<script>
(() => {
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
    });
  });

  function fmtAge(d) {
    const m = Math.round((Date.now() - new Date(d)) / 60000);
    if (m < 2)  return 'gerade';
    if (m < 60) return `${m} min`;
    return `${Math.round(m/60)} Std.`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render(id, items) {
    const el = document.getElementById(id);
    if (!el) return;
    if (!items || !items.length) {
      el.innerHTML = '<div class="state-msg">Keine Artikel verfügbar.</div>';
      return;
    }
    el.innerHTML = items.map(a => `
      <div class="article">
        <div class="article-title"><a href="${esc(a.link)}" target="_blank" rel="noopener noreferrer">${esc(a.title)}</a></div>
        ${a.summary ? `<div class="article-summary">${esc(a.summary)}</div>` : ''}
        <div class="article-meta"><span class="article-source">${esc(a.source)}</span>${a.pubDate ? ` · ${fmtAge(a.pubDate)}` : ''}</div>
      </div>`).join('');
  }

  async function load() {
    try {
      const base = document.location.pathname.replace(/\/[^/]*$/, '/');
      const r = await fetch(`${base}news.json?ts=${Date.now()}`);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      render('list-wirtschaft', data.wirtschaft || []);
      render('list-politik',    data.politik    || []);
      render('list-it',         data.it         || []);
      document.getElementById('last-updated').textContent =
        data.updatedAt ? new Intl.DateTimeFormat('de-DE',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}).format(new Date(data.updatedAt)) : '—';
    } catch(e) {
      ['wirtschaft','politik','it'].forEach(cat => {
        const el = document.getElementById('list-' + cat);
        if (el) el.innerHTML = '<div class="state-msg">Fehler beim Laden von news.json</div>';
      });
      document.getElementById('status-dot').className = 'error';
      document.getElementById('status-label').textContent = 'Fehler';
    }
  }

  load();
  // Seite neu laden wenn sie wieder in den Fokus kommt
  window.addEventListener('focus', load);
})();
</script>
</body>
</html>

name: Retry Update News Feed

on:
  workflow_run:
    workflows:
      - Update News Feed
    types:
      - completed

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rerun:
    if: >-
      ${{ github.event.workflow_run.event == 'schedule' &&
          github.event.workflow_run.conclusion == 'cancelled' &&
          github.event.workflow_run.run_attempt < 3 }}
    runs-on: ubuntu-22.04
    steps:
      - name: Wait for runner capacity
        run: sleep 180
        shell: bash
      - name: Trigger new run
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowRun = context.payload.workflow_run;
            const attempt = workflowRun.run_attempt;
            const owner = workflowRun.head_repository?.owner?.login ?? workflowRun.repository.owner.login;
            const repo = workflowRun.head_repository?.name ?? workflowRun.repository.name;
            const ref = workflowRun.head_branch ?? workflowRun.head_repository?.default_branch ?? workflowRun.repository.default_branch;
            core.info(`Queuing Update News Feed via workflow_dispatch (attempt ${attempt + 1}) on ${owner}/${repo}@${ref}`);
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: workflowRun.workflow_id,
              ref
            });

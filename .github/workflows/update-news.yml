name: RSS Feed aktualisieren

on:
  schedule:
    # Stündlich von 06:00 bis 17:00 Uhr MEZ (= 04:00–15:00 UTC)
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:  # Manueller Start jederzeit möglich

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install feedparser

      - name: RSS-Feeds abrufen und news.json schreiben
        run: python fetch_news.py

      - name: news.json committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "news: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

name: RSS Feed aktualisieren

on:
  schedule:
    # Jede volle Stunde von 06:00 bis 20:00 Uhr MEZ (= 04:00–18:00 UTC)
    - cron: '0 4  * * *'   # 06:00 MEZ
    - cron: '0 5  * * *'   # 07:00 MEZ
    - cron: '0 6  * * *'   # 08:00 MEZ
    - cron: '0 7  * * *'   # 09:00 MEZ
    - cron: '0 8  * * *'   # 10:00 MEZ
    - cron: '0 9  * * *'   # 11:00 MEZ
    - cron: '0 10 * * *'   # 12:00 MEZ
    - cron: '0 11 * * *'   # 13:00 MEZ
    - cron: '0 12 * * *'   # 14:00 MEZ
    - cron: '0 13 * * *'   # 15:00 MEZ
    - cron: '0 14 * * *'   # 16:00 MEZ
    - cron: '0 15 * * *'   # 17:00 MEZ
    - cron: '0 16 * * *'   # 18:00 MEZ
    - cron: '0 17 * * *'   # 19:00 MEZ
    - cron: '0 18 * * *'   # 20:00 MEZ
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install feedparser

      - name: RSS-Feeds abrufen und news.json schreiben
        run: python fetch_news.py

      - name: news.json committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "news: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
